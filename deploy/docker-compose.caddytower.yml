services:
  shared-caddy:
    profiles:
      - bundled-caddy
    image: caddy:2.10
    container_name: shared-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge

  watchtower:
    profiles:
      - bundled-watchtower
    image: containrrr/watchtower:1.7.1
    container_name: watchtower
    restart: unless-stopped
    command:
      - --label-enable
      - --cleanup
      - --interval
      - "300"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - edge

  caddytower:
    image: ${CADDYTOWER_IMAGE:-ghcr.io/knopkem/caddytower:latest}
    container_name: caddytower
    restart: unless-stopped
    env_file:
      - ./caddytower.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddytower-data:/data
      # installer-managed mounts go here
    networks:
      - edge
    labels:
      com.centurylinklabs.watchtower.enable: "true"

volumes:
  caddytower-data:
  caddy-data:
  caddy-config:

networks:
  edge:
    external: true
